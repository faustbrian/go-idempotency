name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: idempotency
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d idempotency"
          --health-interval 2s
          --health-timeout 2s
          --health-retries 20
      valkey:
        image: valkey/valkey:9.0
        ports:
          - 6379:6379
        options: >-
          --health-cmd "valkey-cli ping"
          --health-interval 2s
          --health-timeout 2s
          --health-retries 20
    env:
      POSTGRES_URL: >-
        postgres://postgres:postgres@127.0.0.1:5432/idempotency?sslmode=disable
      VALKEY_ADDR: 127.0.0.1:6379
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache: true
      - name: Validate semantic version tag
        shell: bash
        run: |
          if [[ ! "$GITHUB_REF_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "invalid semantic version tag: $GITHUB_REF_NAME" >&2
            exit 1
          fi
      - name: Verify formatting and APIs
        shell: bash
        run: |
          test -z "$(gofmt -l .)"
          go run golang.org/x/lint/golint@v0.0.0-20241112194109-818c5a804067 \
            -set_exit_status ./...
          for package in $(go list ./...); do
            go doc "$package" >/dev/null
          done
          go test . -run '^Example' -count=1
      - name: Test race and backend integration contracts
        run: go test -race ./... -count=1
      - name: Vet
        run: go vet ./...
      - name: Static analysis
        run: go run honnef.co/go/tools/cmd/staticcheck@latest ./...
      - name: Vulnerability scan
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...
      - name: Enforce exact production coverage
        shell: bash
        run: |
          packages=$(go list ./... | grep -v '/idempotencytest$' | paste -sd, -)
          go test -coverpkg="$packages" -coverprofile=coverage.out ./...
          coverage=$(go tool cover -func=coverage.out | awk '/^total:/ {print $3}')
          test "$coverage" = "100.0%"
  publish:
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
